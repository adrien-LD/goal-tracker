services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/data/dev.db}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data:
    name: goal_tracker_sqlite_data
