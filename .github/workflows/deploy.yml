name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY is required}"
          if [[ -z "${DEPLOY_PORT}" ]]; then
            echo "DEPLOY_PORT=22" >> "${GITHUB_ENV}"
          else
            echo "DEPLOY_PORT=${DEPLOY_PORT}" >> "${GITHUB_ENV}"
          fi

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          if grep -q '\\n' <<<"${DEPLOY_SSH_KEY}"; then
            printf '%b' "${DEPLOY_SSH_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          else
            printf '%s' "${DEPLOY_SSH_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -yf ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Ensure server directories
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DEPLOY_PATH}' '/opt/goal-tracker/backups'"

      - name: Sync project files
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".git/" \
            --exclude "node_modules/" \
            --exclude ".next/" \
            --exclude "prisma/dev.db" \
            --exclude "prisma/dev.db-journal" \
            -e "ssh -p ${DEPLOY_PORT}" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Run remote deploy script
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && chmod +x deploy/remote-deploy.sh deploy/backup-sqlite.sh && ./deploy/remote-deploy.sh"
