name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY is required}"
          if [[ -z "${DEPLOY_PORT}" ]]; then
            echo "DEPLOY_PORT=22" >> "${GITHUB_ENV}"
          else
            echo "DEPLOY_PORT=${DEPLOY_PORT}" >> "${GITHUB_ENV}"
          fi

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          RAW_KEY="${DEPLOY_SSH_KEY}"
          if grep -q '\\n' <<<"${RAW_KEY}"; then
            RAW_KEY="$(printf '%b' "${RAW_KEY}")"
          fi
          RAW_KEY="$(printf '%s' "${RAW_KEY}" | tr -d '\r')"

          if grep -Eq 'BEGIN [A-Z0-9 ]*PRIVATE KEY' <<<"${RAW_KEY}"; then
            printf '%s\n' "${RAW_KEY}" > ~/.ssh/id_ed25519
          else
            DECODED_KEY="$(printf '%s' "${RAW_KEY}" | base64 -d 2>/dev/null || true)"
            DECODED_KEY="$(printf '%s' "${DECODED_KEY}" | tr -d '\r')"
            if grep -Eq 'BEGIN [A-Z0-9 ]*PRIVATE KEY' <<<"${DECODED_KEY}"; then
              printf '%s\n' "${DECODED_KEY}" > ~/.ssh/id_ed25519
            else
              echo "DEPLOY_SSH_KEY is invalid. Provide a full private key or base64-encoded private key." >&2
              exit 1
            fi
          fi
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keygen -yf ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "DEPLOY_SSH_KEY cannot be parsed. Ensure it is an unencrypted private key." >&2
            exit 1
          fi
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Ensure server directories
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DEPLOY_PATH}' '/opt/goal-tracker/backups'"

      - name: Sync project files
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".git/" \
            --exclude "node_modules/" \
            --exclude ".next/" \
            --exclude "prisma/dev.db" \
            --exclude "prisma/dev.db-journal" \
            -e "ssh -p ${DEPLOY_PORT}" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Run remote deploy script
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && chmod +x deploy/remote-deploy.sh deploy/backup-sqlite.sh && ./deploy/remote-deploy.sh"
